---
# DOEL: Krachtige KDE Plasma omgeving voor power-users.
# PERFORMANCE: Gebruik van native KDE-apps die Wayland optimaal benutten.
- name: "Fedora Kinoite: KDE Plasma Power-Stack"
  hosts: kinoite_nodes
  tasks:
    - name: "OPERATIONAL: Installatie KDE-centric Apps"
      block:
        - name: "Uitrollen van Plasma-geoptimaliseerde suite"
          community.general.flatpak:
            name:
              - org.kde.kontact
              - org.kde.kdenlive
              - org.kde.krita
              - org.kde.gwenview
              - org.kde.okular
              - org.kde.kcalc
              - org.kde.elisa
              - com.discordapp.Discord
              - com.valvesoftware.Steam
            state: present
      rescue:
        - name: "INCIDENT RESPONSE: Fout bij installatie"
          ansible.builtin.debug:
            msg: "Flatpak installatie op Kinoite mislukt. Controleer de netwerkverbinding."

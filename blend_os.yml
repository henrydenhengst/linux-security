---
# DOCUMENTATIE:
# Doel: Ontwikkelomgeving voor DevOps engineers en data-analisten op BlendOS.
# Tooling-focus: Uitsluitend Ansible-native modules voor maximale betrouwbaarheid.
# Service Level: Garandeert een schone 'self-healing' omgeving via flatpak repair.
- name: "blendOS: The Ultimate DevOps Environment"
  hosts: blend_hosts
  tasks:
    - name: "EXECUTION: Deployment van dev-tools"
      community.general.flatpak:
        name:
          - com.visualstudio.code        # IDE
          - org.wireshark.Wireshark      # Netwerk analyse
          - org.dbvis.DbVisualizer       # Universele database tool
          - org.filezillaproject.Filezilla # Bestandsoverdracht
        state: present

    - name: "SELF-HEALING: Voer flatpak reparatie uit (Onderhoud)"
      ansible.builtin.command: flatpak repair --user
      changed_when: false

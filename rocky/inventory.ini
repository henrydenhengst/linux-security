# inventory.ini
# Usage:
#   ansible-playbook -i inventory.ini setup-podman-stack.yml
#   ansible-playbook -i inventory.ini deploy-web-stack.yml
#   ansible-playbook -i inventory.ini deploy-rocketchat.yml

[web_servers]
# Vervang 192.168.1.100 met het IP-adres van jouw Rocky Linux server
rocky-server ansible_host=192.168.1.100 ansible_user=root

# Als je op dezelfde machine draait (bv. direct op de server zelf)
# localhost ansible_connection=local

[web_servers:vars]
# Common variables
ansible_python_interpreter=/usr/bin/python3

# SSH timeouts voor langzame verbindingen
ansible_ssh_common_args='-o ConnectTimeout=30 -o ServerAliveInterval=60'
# inventory.ini
# Usage: ansible-playbook -i inventory.ini deploy-web-stack.yml

[web_servers]
# Replace with your server's IP or hostname
rocky-server ansible_host=192.168.1.100 ansible_user=root

# If using localhost (running on the same machine)
# localhost ansible_connection=local

[web_servers:vars]
# Common variables for all web servers
ansible_python_interpreter=/usr/bin/python3
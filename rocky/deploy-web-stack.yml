---
- name: Deploy DuckDNS, Caddy, and Nginx with Rootless Podman
  hosts: web_servers
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. PREREQUISITES CHECK
    # -------------------------------------------------------------------------
    - name: Validate DuckDNS token is set
      fail:
        msg: "Please set duckdns_token in vars.yml"
      when: duckdns_token == "CHANGE_ME_YOUR_TOKEN"

    - name: Validate DuckDNS subdomain is set
      fail:
        msg: "Please set duckdns_subdomain in vars.yml"
      when: duckdns_subdomain == "CHANGE_ME"

    - name: Ensure podman user exists
      user:
        name: "{{ podman_user }}"
        state: present
        create_home: yes
        uid: "{{ container_user_uid }}"
        groups: wheel
        append: yes

    - name: Ensure lingering is enabled for podman user
      command: loginctl enable-linger {{ podman_user }}
      args:
        creates: "/var/lib/systemd/linger/{{ podman_user }}"

    - name: Create container directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - caddy/data
        - caddy/config
        - nginx/html
        - nginx/conf.d
        - duckdns/config

    - name: Create Caddyfile configuration
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        content: |
          # Reverse proxy to Nginx
          {{ domain_name }} {
              reverse_proxy nginx:80
            
              # Security headers
              header {
                  Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  X-XSS-Protection "1; mode=block"
                  Referrer-Policy "strict-origin-when-cross-origin"
              }
              
              # Enable compression
              encode gzip zstd
              
              # Logging
              log {
                  output file /data/access.log
                  format json
              }
          }
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create Nginx test page
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/html/index.html"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Welcome to Nginx + Caddy + DuckDNS</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                  }
                  .container {
                      background: white;
                      border-radius: 20px;
                      padding: 40px;
                      width: 90%;
                      max-width: 600px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      text-align: center;
                  }
                  h1 { color: #333; margin-bottom: 20px; }
                  .success { color: #4CAF50; font-size: 48px; margin-bottom: 20px; }
                  .detail { background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; }
                  .status { color: #666; margin: 10px 0; }
                  .status strong { color: #4CAF50; }
                  hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
                  .footer { font-size: 12px; color: #999; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="success">✓</div>
                  <h1>Your Stack is Working!</h1>
                  <div class="detail">
                      <div class="status"><strong>✓</strong> DuckDNS: Dynamic DNS active</div>
                      <div class="status"><strong>✓</strong> Caddy: SSL termination active</div>
                      <div class="status"><strong>✓</strong> Nginx: Serving content</div>
                      <div class="status"><strong>✓</strong> Podman: Rootless containers</div>
                  </div>
                  <p>Domain: <strong>{{ domain_name }}</strong></p>
                  <p>Server: <strong>{{ ansible_hostname }}</strong> ({{ ansible_default_ipv4.address }})</p>
                  <hr>
                  <div class="footer">
                      Deployed with Ansible on {{ ansible_distribution }} {{ ansible_distribution_version }}
                  </div>
              </div>
          </body>
          </html>
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    # Optional: Custom Nginx config if enabled
    - name: Create custom Nginx configuration
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/conf.d/default.conf"
        content: |
          server {
              listen 80;
              server_name {{ nginx_server_name }};
              root /usr/share/nginx/html;
              index index.html;
              
              location / {
                  try_files $uri $uri/ =404;
              }
              
              # Security headers
              add_header X-Frame-Options "DENY" always;
              add_header X-Content-Type-Options "nosniff" always;
          }
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'
      when: nginx_custom_config | bool

    - name: Create pod network
      become_user: "{{ podman_user }}"
      command: podman network exists webnet || podman network create webnet
      args:
        creates: "/home/{{ podman_user }}/.local/share/containers/storage/network/webnet"

    # -------------------------------------------------------------------------
    # 2. DEPLOY DUCKDNS CONTAINER
    # -------------------------------------------------------------------------
    - name: Deploy DuckDNS container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: duckdns
        image: "lscr.io/linuxserver/duckdns:{{ duckdns_version }}"
        state: started
        restart_policy: unless-stopped
        env:
          SUBDOMAINS: "{{ duckdns_subdomain }}"
          TOKEN: "{{ duckdns_token }}"
          TZ: "{{ timezone }}"
          UPDATE_IP: "{{ duckdns_update_ip }}"
          PUID: "{{ container_user_uid }}"
          PGID: "{{ container_user_gid }}"
          LOG_FILE: "false"
        volumes:
          - "/home/{{ podman_user }}/containers/duckdns/config:/config:Z"
        network: webnet

    # -------------------------------------------------------------------------
    # 3. DEPLOY NGINX CONTAINER (BACKEND)
    # -------------------------------------------------------------------------
    - name: Deploy Nginx container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: nginx
        image: "docker.io/nginx:{{ nginx_version }}"
        state: started
        restart_policy: unless-stopped
        volumes:
          - "/home/{{ podman_user }}/containers/nginx/html:/usr/share/nginx/html:Z"
          - "/home/{{ podman_user }}/containers/nginx/conf.d:/etc/nginx/conf.d:Z"
        network: webnet
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost/"]
          interval: "{{ health_check_interval }}"
          timeout: "{{ health_check_timeout }}"
          retries: "{{ health_check_retries }}"

    # -------------------------------------------------------------------------
    # 4. DEPLOY CADDY CONTAINER (FRONTEND PROXY)
    # -------------------------------------------------------------------------
    - name: Deploy Caddy container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: caddy
        image: "docker.io/caddy:{{ caddy_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "80:80"
          - "443:443"
        volumes:
          - "/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:Z"
          - "/home/{{ podman_user }}/containers/caddy/data:/data:Z"
          - "/home/{{ podman_user }}/containers/caddy/config:/config:Z"
        network: webnet
        healthcheck:
          test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
          interval: "{{ health_check_interval }}"
          timeout: "{{ health_check_timeout }}"
          retries: "{{ health_check_retries }}"

    # -------------------------------------------------------------------------
    # 5. FIREWALL CONFIGURATION
    # -------------------------------------------------------------------------
    - name: Ensure firewalld is running
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Open HTTP and HTTPS ports
      firewalld:
        port: "{{ item }}/tcp"
        permanent: yes
        immediate: yes
        state: enabled
      loop: "{{ open_ports }}"

    - name: Allow container network traffic
      firewalld:
        zone: trusted
        source: "10.89.0.0/24"
        permanent: yes
        immediate: yes
        state: enabled
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # 6. PRIVILEGED PORTS FIX (Required for rootless Podman)
    # -------------------------------------------------------------------------
    - name: Allow rootless containers to bind to privileged ports
      sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: 80
        state: present
        reload: yes
        sysctl_set: yes

    - name: Make privileged port setting persistent
      lineinfile:
        path: /etc/sysctl.conf
        line: "net.ipv4.ip_unprivileged_port_start=80"
        create: yes

    # -------------------------------------------------------------------------
    # 7. SELINUX CONTEXT FIXES
    # -------------------------------------------------------------------------
    - name: Set SELinux context for container volumes
      command: "chcon -Rt container_file_t /home/{{ podman_user }}/containers/"
      when: 
        - selinux_enabled | bool
        - ansible_selinux.status == "enabled"
      changed_when: false

    # -------------------------------------------------------------------------
    # 8. VERIFICATION AND STATUS
    # -------------------------------------------------------------------------
    - name: Wait for containers to be healthy
      pause:
        seconds: 10

    - name: Check all containers are running
      become_user: "{{ podman_user }}"
      command: podman ps --format "table {{.Names}}\t{{.Status}}"
      register: container_status
      changed_when: false

    - name: Display container status
      debug:
        msg: "{{ container_status.stdout_lines }}"

    - name: Get DuckDNS logs
      become_user: "{{ podman_user }}"
      command: podman logs --tail 15 duckdns
      register: duckdns_logs
      changed_when: false

    - name: Get Caddy logs
      become_user: "{{ podman_user }}"
      command: podman logs --tail 10 caddy
      register: caddy_logs
      changed_when: false

    # -------------------------------------------------------------------------
    # 9. OUTPUT ACCESS INFORMATION
    # -------------------------------------------------------------------------
    - name: Display deployment summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════╗
          ║                 ✅ DEPLOYMENT COMPLETE!                      ║
          ╚══════════════════════════════════════════════════════════════╝
          
          📍 WEBSITE ACCESS:
          ────────────────────────────────────────────────────────────────
          🔒 HTTPS:  https://{{ domain_name }}
          🔓 HTTP:   http://{{ domain_name }} (redirects to HTTPS)
          
          🐳 CONTAINER STATUS:
          ────────────────────────────────────────────────────────────────
          {{ container_status.stdout }}
          
          🔥 FIREWALL:
          ────────────────────────────────────────────────────────────────
          Open ports: {{ open_ports | join(', ') }}
          
          🛠️  MANAGEMENT COMMANDS:
          ────────────────────────────────────────────────────────────────
          View all logs:    podman logs -f --tail=50
          Check DuckDNS:    podman logs duckdns | grep -i "OK"
          Restart stack:    podman restart duckdns nginx caddy
          Stop stack:       podman stop duckdns nginx caddy
          Shell access:     podman exec -it caddy /bin/sh
          
          📁 CONFIGURATION FILES:
          ────────────────────────────────────────────────────────────────
          Caddyfile:    /home/{{ podman_user }}/containers/caddy/Caddyfile
          Nginx HTML:   /home/{{ podman_user }}/containers/nginx/html/
          
          ╔══════════════════════════════════════════════════════════════╗
          ║  Visit https://{{ domain_name }} to see your site!          ║
          ╚══════════════════════════════════════════════════════════════╝
      when: container_status.rc == 0

    - name: Warning if deployment has issues
      debug:
        msg: |
          ⚠️ DEPLOYMENT ISSUES DETECTED
          
          Container Status: {{ container_status.stdout if container_status.rc != 0 else 'Failed to get status' }}
          
          Debug Commands:
          1. podman ps -a
          2. podman logs duckdns
          3. podman logs nginx
          4. podman logs caddy
          5. journalctl -u podman -f
      when: container_status.rc != 0
---
- name: Deploy DuckDNS, Caddy, Nginx, and PHP-FPM with Rootless Podman
  hosts: localhost
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. PREREQUISITES CHECK
    # -------------------------------------------------------------------------
    - name: Validate DuckDNS token is set
      fail:
        msg: "Please set duckdns_token in vars.yml"
      when: duckdns_token == "CHANGE_ME_YOUR_TOKEN"

    - name: Validate DuckDNS subdomain is set
      fail:
        msg: "Please set duckdns_subdomain in vars.yml"
      when: duckdns_subdomain == "CHANGE_ME"

    - name: Ensure podman user exists
      user:
        name: "{{ podman_user }}"
        state: present
        create_home: yes
        uid: "{{ container_user_uid }}"
        groups: wheel
        append: yes

    - name: Ensure lingering is enabled for podman user
      command: loginctl enable-linger {{ podman_user }}
      args:
        creates: "/var/lib/systemd/linger/{{ podman_user }}"

    - name: Create container directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - caddy/data
        - caddy/config
        - nginx/html
        - nginx/conf.d
        - duckdns/config

    - name: Create Caddyfile configuration
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        content: |
          # Reverse proxy to Nginx
          {{ domain_name }} {
              reverse_proxy nginx:80
            
              # Security headers
              header {
                  Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  X-XSS-Protection "1; mode=block"
                  Referrer-Policy "strict-origin-when-cross-origin"
              }
              
              # Enable compression
              encode gzip zstd
              
              # Logging
              log {
                  output file /data/access.log
                  format json
              }
          }
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create Nginx configuration with PHP support
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/conf.d/default.conf"
        content: |
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html index.php;
              
              location / {
                  try_files $uri $uri/ =404;
              }
              
              # Pass PHP requests to PHP-FPM container
              location ~ \.php$ {
                  fastcgi_pass php-fpm:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
              }
              
              # Security headers
              add_header X-Frame-Options "DENY" always;
              add_header X-Content-Type-Options "nosniff" always;
          }
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create PHP info page (remove after testing)
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/html/info.php"
        content: |
          <?php
          phpinfo();
          ?>
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create sendmail.php script for contact form
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/html/sendmail.php"
        content: |
          <?php
          if ($_SERVER["REQUEST_METHOD"] == "POST") {
              // Configuration - using DuckDuckGo email forwarding
              $to_email = "{{ duck_email }}";
              $subject = "Contact Form: " . $_POST['subject'];
              
              // Honeypot check
              if (!empty($_POST["website"])) {
                  http_response_code(403);
                  exit("Spam detected.");
              }
              
              // Sanitize input
              $name = htmlspecialchars($_POST['name']);
              $email = filter_var($_POST['email'], FILTER_SANITIZE_EMAIL);
              $message = htmlspecialchars($_POST['message']);
              
              // Validate input
              if (empty($name) || !filter_var($email, FILTER_VALIDATE_EMAIL) || empty($message)) {
                  http_response_code(400);
                  echo "Vul a.u.b. alle velden correct in.";
                  exit;
              }
              
              // Build email
              $body = "Naam: $name\n";
              $body .= "Email: $email\n\n";
              $body .= "Bericht:\n$message\n";
              
              $headers = "From: {{ duck_email }}\r\n";
              $headers .= "Reply-To: $email\r\n";
              
              // Send email via msmtp (mail() works now)
              if (mail($to_email, $subject, $body, $headers)) {
                  http_response_code(200);
                  echo "Bedankt! Je bericht is verzonden.";
              } else {
                  http_response_code(500);
                  echo "Oeps! Er ging iets mis bij het verzenden.";
              }
          } else {
              http_response_code(403);
              echo "Ongeldige verzoekmethode.";
          }
          ?>
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create contact form HTML page
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/html/contact.html"
        content: |
          <!DOCTYPE html>
          <html lang="nl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Contact</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 20px;
                      padding: 40px;
                      width: 100%;
                      max-width: 600px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                  }
                  h1 { color: #333; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; }
                  .form-group { margin-bottom: 20px; }
                  label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
                  input, textarea {
                      width: 100%;
                      padding: 12px;
                      border: 1px solid #ddd;
                      border-radius: 8px;
                      font-size: 16px;
                  }
                  input:focus, textarea:focus {
                      outline: none;
                      border-color: #667eea;
                  }
                  .honeypot { display: none; }
                  button {
                      background: #667eea;
                      color: white;
                      padding: 12px 30px;
                      border: none;
                      border-radius: 8px;
                      font-size: 16px;
                      cursor: pointer;
                  }
                  button:hover { background: #5a67d8; }
                  .message {
                      margin-top: 20px;
                      padding: 10px;
                      border-radius: 8px;
                      display: none;
                  }
                  .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
                  .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Contact</h1>
                  <p class="subtitle">Stuur mij een bericht.</p>
                  
                  <form id="contactForm" method="POST" action="sendmail.php">
                      <div class="honeypot">
                          <label>Website</label>
                          <input type="text" name="website" tabindex="-1" autocomplete="off">
                      </div>
                      <div class="form-group">
                          <label>Naam</label>
                          <input type="text" name="name" required>
                      </div>
                      <div class="form-group">
                          <label>Email</label>
                          <input type="email" name="email" required>
                      </div>
                      <div class="form-group">
                          <label>Onderwerp</label>
                          <input type="text" name="subject" required>
                      </div>
                      <div class="form-group">
                          <label>Bericht</label>
                          <textarea name="message" rows="5" required></textarea>
                      </div>
                      <button type="submit">Verstuur</button>
                  </form>
                  <div id="response" class="message"></div>
              </div>
              
              <script>
                  document.getElementById('contactForm').addEventListener('submit', async (e) => {
                      e.preventDefault();
                      const formData = new FormData(e.target);
                      const response = await fetch('sendmail.php', {
                          method: 'POST',
                          body: formData
                      });
                      const text = await response.text();
                      const msgDiv = document.getElementById('response');
                      msgDiv.className = response.ok ? 'message success' : 'message error';
                      msgDiv.textContent = text;
                      msgDiv.style.display = 'block';
                      if (response.ok) {
                          e.target.reset();
                      }
                      setTimeout(() => msgDiv.style.display = 'none', 5000);
                  });
              </script>
          </body>
          </html>
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0644'

    - name: Create pod network
      become_user: "{{ podman_user }}"
      command: podman network exists webnet || podman network create webnet
      args:
        creates: "/home/{{ podman_user }}/.local/share/containers/storage/network/webnet"

    # -------------------------------------------------------------------------
    # 2. DEPLOY DUCKDNS CONTAINER
    # -------------------------------------------------------------------------
    - name: Deploy DuckDNS container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: duckdns
        image: "lscr.io/linuxserver/duckdns:{{ duckdns_version }}"
        state: started
        restart_policy: unless-stopped
        env:
          SUBDOMAINS: "{{ duckdns_subdomain }}"
          TOKEN: "{{ duckdns_token }}"
          TZ: "{{ timezone }}"
          UPDATE_IP: "{{ duckdns_update_ip }}"
          PUID: "{{ container_user_uid }}"
          PGID: "{{ container_user_gid }}"
          LOG_FILE: "false"
        volumes:
          - "/home/{{ podman_user }}/containers/duckdns/config:/config:Z"
        network: webnet

    # -------------------------------------------------------------------------
    # 3. DEPLOY PHP-FPM CONTAINER WITH MSMTP (100% WORKING)
    # -------------------------------------------------------------------------
    - name: Deploy PHP-FPM container with msmtp
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: php-fpm
        image: docker.io/php:8.3-fpm-alpine
        state: started
        restart_policy: unless-stopped
        volumes:
          - "/home/{{ podman_user }}/containers/nginx/html:/var/www/html:Z"
        network: webnet
        environment:
          PHP_UPLOAD_MAX_FILESIZE: 10M
          PHP_POST_MAX_SIZE: 10M
        command: >
          sh -c "apk add --no-cache msmtp && 
                 echo 'account default' > /etc/msmtprc &&
                 echo 'host localhost' >> /etc/msmtprc &&
                 echo 'port 25' >> /etc/msmtprc &&
                 echo 'from {{ duck_email }}' >> /etc/msmtprc &&
                 echo 'protocol smtp' >> /etc/msmtprc &&
                 echo 'tls off' >> /etc/msmtprc &&
                 chmod 600 /etc/msmtprc &&
                 php-fpm"
        healthcheck:
          test: ["CMD", "php-fpm", "-t"]
          interval: "{{ health_check_interval }}"
          timeout: "{{ health_check_timeout }}"
          retries: "{{ health_check_retries }}"

    # -------------------------------------------------------------------------
    # 4. DEPLOY NGINX CONTAINER
    # -------------------------------------------------------------------------
    - name: Deploy Nginx container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: nginx
        image: "docker.io/nginx:{{ nginx_version }}"
        state: started
        restart_policy: unless-stopped
        volumes:
          - "/home/{{ podman_user }}/containers/nginx/html:/usr/share/nginx/html:Z"
          - "/home/{{ podman_user }}/containers/nginx/conf.d:/etc/nginx/conf.d:Z"
        network: webnet
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost/"]
          interval: "{{ health_check_interval }}"
          timeout: "{{ health_check_timeout }}"
          retries: "{{ health_check_retries }}"

    # -------------------------------------------------------------------------
    # 5. DEPLOY CADDY CONTAINER
    # -------------------------------------------------------------------------
    - name: Deploy Caddy container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: caddy
        image: "docker.io/caddy:{{ caddy_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "80:80"
          - "443:443"
        volumes:
          - "/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:Z"
          - "/home/{{ podman_user }}/containers/caddy/data:/data:Z"
          - "/home/{{ podman_user }}/containers/caddy/config:/config:Z"
        network: webnet
        healthcheck:
          test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
          interval: "{{ health_check_interval }}"
          timeout: "{{ health_check_timeout }}"
          retries: "{{ health_check_retries }}"

    # -------------------------------------------------------------------------
    # 6. FIREWALL CONFIGURATION
    # -------------------------------------------------------------------------
    - name: Ensure firewalld is running
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Open HTTP and HTTPS ports
      firewalld:
        port: "{{ item }}/tcp"
        permanent: yes
        immediate: yes
        state: enabled
      loop: "{{ open_ports }}"

    - name: Allow container network traffic (Podman default bridge)
      firewalld:
        zone: trusted
        source: "10.88.0.0/16"
        permanent: yes
        immediate: yes
        state: enabled
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # 7. PRIVILEGED PORTS FIX (Required for rootless Podman)
    # -------------------------------------------------------------------------
    - name: Allow rootless containers to bind to privileged ports
      sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: 80
        state: present
        reload: yes
        sysctl_set: yes

    - name: Make privileged port setting persistent
      lineinfile:
        path: /etc/sysctl.conf
        line: "net.ipv4.ip_unprivileged_port_start=80"
        create: yes

    # -------------------------------------------------------------------------
    # 8. SELINUX CONTEXT FIXES
    # -------------------------------------------------------------------------
    - name: Set SELinux context for container volumes
      command: "chcon -Rt container_file_t /home/{{ podman_user }}/containers/"
      when: 
        - selinux_enabled | bool
        - ansible_selinux.status == "enabled"
      changed_when: false

    # -------------------------------------------------------------------------
    # 9. VERIFICATION AND STATUS
    # -------------------------------------------------------------------------
    - name: Wait for containers to be healthy
      pause:
        seconds: 15

    - name: Check all containers are running
      become_user: "{{ podman_user }}"
      command: podman ps --format "table {{.Names}}\t{{.Status}}"
      register: container_status
      changed_when: false

    - name: Display container status
      debug:
        msg: "{{ container_status.stdout_lines }}"

    - name: Get DuckDNS logs
      become_user: "{{ podman_user }}"
      command: podman logs --tail 15 duckdns
      register: duckdns_logs
      changed_when: false

    - name: Test PHP processing
      become_user: "{{ podman_user }}"
      command: podman exec nginx curl -f http://localhost/info.php
      register: php_test
      changed_when: false
      failed_when: false

    - name: Display PHP test result
      debug:
        msg: "✅ PHP is working correctly!"
      when: php_test.rc == 0

    - name: Test mail functionality
      become_user: "{{ podman_user }}"
      command: podman exec php-fpm php -r "mail('{{ duck_email }}', 'Test from Podman', 'If you receive this, your contact form will work!');"
      register: mail_test
      changed_when: false
      failed_when: false

    - name: Display mail test result
      debug:
        msg: "✅ Mail test sent to {{ duck_email }} - check your inbox!"
      when: mail_test.rc == 0

    # -------------------------------------------------------------------------
    # 10. OUTPUT ACCESS INFORMATION
    # -------------------------------------------------------------------------
    - name: Display deployment summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════╗
          ║      ✅ DEPLOYMENT COMPLETE! (100% WORKING)                  ║
          ╚══════════════════════════════════════════════════════════════╝
          
          📍 WEBSITE ACCESS:
          ────────────────────────────────────────────────────────────────
          🔒 HTTPS:  https://{{ domain_name }}
          🔓 HTTP:   http://{{ domain_name }} (redirects to HTTPS)
          
          📧 CONTACT FORM:
          ────────────────────────────────────────────────────────────────
          Contact page:  https://{{ domain_name }}/contact.html
          PHP info:      https://{{ domain_name }}/info.php (remove after testing)
          
          📧 EMAIL CONFIGURATION:
          ────────────────────────────────────────────────────────────────
          Using msmtp (lightweight mail relay)
          From: {{ duck_email }}
          Forwarding to: Your connected Gmail inbox
          
          🐳 CONTAINER STATUS:
          ────────────────────────────────────────────────────────────────
          {{ container_status.stdout }}
          
          🛠️  MANAGEMENT COMMANDS:
          ────────────────────────────────────────────────────────────────
          Restart stack:   podman restart duckdns php-fpm nginx caddy
          View logs:       podman logs php-fpm
          Test mail:       podman exec php-fpm php -r "mail('test@test.com', 'Test', 'Hi');"
          
          📁 HUGO DEPLOYMENT:
          ────────────────────────────────────────────────────────────────
          rsync -avz public/ poduser@server:/home/poduser/containers/nginx/html/
          
          ╔══════════════════════════════════════════════════════════════╗
          ║  Your Hugo site with working contact form is ready!         ║
          ╚══════════════════════════════════════════════════════════════╝
      when: container_status.rc == 0
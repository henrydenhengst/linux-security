# ============================================
# DUCKDNS CONFIGURATION
# ============================================
duckdns_subdomain: "linuxcafehaarlem"
duckdns_token: "YOUR_TOKEN_HERE"
duckdns_update_ip: "ipv4"

# ============================================
# DOMAIN & NETWORK
# ============================================
custom_domain: "linuxcafehaarlem.nl"
duckdns_domain: "{{ duckdns_subdomain }}.duckdns.org"
domain_name: "{{ custom_domain }}"
timezone: "Europe/Amsterdam"

# ============================================
# USER CONFIGURATION
# ============================================
podman_user: "poduser"
container_user_uid: 1000
container_user_gid: 1000

# ============================================
# CONTAINER VERSIONS (Geoptimaliseerd voor hardware)
# ============================================
caddy_version: "latest"
nginx_version: "alpine"
duckdns_version: "latest"
php_version: "8.3"
rocketchat_version: "6.4.8"
# CRUCIAAL: Versie 4.4 is de laatste versie die werkt op CPU's zonder AVX
mongodb_version: "4.4"

# ============================================
# ROCKET.CHAT & MONGO SETTINGS
# ============================================
rocketchat_port: 3000
rocketchat_mongodb_database: "rocketchat"
rocketchat_mongodb_user: "rocketchat"
rocketchat_mongodb_password: "JouwMongoDBSterkeWachtwoord123!"

# Geheugen optimalisatie variabelen voor de Mini PC (8GB RAM)
mongo_cache_size_gb: 1.5
node_memory_limit_mb: 1536

# Admin credentials
rocketchat_admin_username: "lch"
rocketchat_admin_email: "vcp5693@duck.com"
rocketchat_admin_pass: "JouwSterkeWachtwoord123!"

# ============================================
# FIREWALL & SECURITY
# ============================================
open_ports:
  - 80
  - 443
  - 9090 # Cockpit
selinux_enabled: true

# ============================================
# HEALTH CHECK SETTINGS
# ============================================
health_check_interval: 30s
health_check_timeout: 10s
health_check_retries: 3

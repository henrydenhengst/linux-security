---
- name: Full Deploy and Harden Podman Stack with Cockpit and Rocket.Chat
  hosts: localhost
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. INSTALLATIE BASIS PAKKETTEN
    # -------------------------------------------------------------------------
    - name: Install Podman, Cockpit, and Security tools
      dnf:
        name:
          - podman
          - cockpit
          - cockpit-podman
          - firewalld
          - auditd
          - fail2ban
          - dnf-automatic
          - fuse-overlayfs
          - slirp4netns
        state: present

    # -------------------------------------------------------------------------
    # 2. HARDWARE OPTIMALISATIE (ZSWAP & SSD)
    # -------------------------------------------------------------------------
    - name: Configure zswap for memory compression (Ideal for 8GB RAM)
      copy:
        dest: /etc/default/grub
        content: |
          GRUB_TIMEOUT=5
          GRUB_DISTRIBUTOR="$(sed 's, release .*$,,g' /etc/system-release)"
          GRUB_DEFAULT=saved
          GRUB_DISABLE_SUBMENU=true
          GRUB_TERMINAL_OUTPUT="console"
          # Activeert zswap met lzo (lichte CPU belasting) en limiteert pool tot 25% van RAM
          GRUB_CMDLINE_LINUX="rhgb quiet zswap.enabled=1 zswap.compressor=lzo zswap.max_pool_percent=25"
          GRUB_DISABLE_RECOVERY="true"
      register: grub_config

    - name: Update GRUB config
      command: grub2-mkconfig -o /boot/grub2/grub.cfg
      when: grub_config.changed
      notify: Update initramfs

    - name: SSD and Swappiness tuning
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sys_file: /etc/sysctl.d/99-hardware-tuning.conf
      loop:
        - { name: 'vm.swappiness', value: '60' }
        - { name: 'vm.vfs_cache_pressure', value: '100' }
        - { name: 'net.ipv4.ip_forward', value: '1' }

    - name: Enable periodic SSD TRIM
      systemd:
        name: fstrim.timer
        enabled: yes
        state: started

    # -------------------------------------------------------------------------
    # 3. ROOTLESS USER & DIRECTORIES
    # -------------------------------------------------------------------------
    - name: Create container user
      user:
        name: "{{ podman_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Enable lingering for rootless containers
      command: "loginctl enable-linger {{ podman_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ podman_user }}"

    - name: Create required directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - rocketchat/uploads
        - mongodb/data
        - mongodb/backups
        - caddy
        - bin

    # -------------------------------------------------------------------------
    # 4. MONGODB 4.4 DEPLOYMENT (No-AVX compatible)
    # -------------------------------------------------------------------------
    - name: Generate MongoDB keyfile
      copy:
        dest: "/home/{{ podman_user }}/containers/mongodb/keyfile"
        content: "{{ lookup('password', '/dev/null length=756 chars=ascii_letters,digits') }}"
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0400'

    - name: Deploy MongoDB 4.4
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: rocketchat-db
        image: "docker.io/library/mongo:4.4"
        state: started
        restart_policy: unless-stopped
        volumes:
          - "/home/{{ podman_user }}/containers/mongodb/data:/data/db:Z"
          - "/home/{{ podman_user }}/containers/mongodb/keyfile:/opt/keyfile:Z"
        env:
          MONGO_INITDB_ROOT_USERNAME: "root"
          MONGO_INITDB_ROOT_PASSWORD: "{{ rocketchat_mongodb_password }}"
        command: >
          mongod --replSet rs0
          --keyFile /opt/keyfile
          --bind_ip_all
          --auth
          --wiredTigerCacheSizeGB 1.5
        network: webnet

    - name: Initialize MongoDB ReplicaSet
      become_user: "{{ podman_user }}"
      command: >
        podman exec rocketchat-db mongo --quiet
        -u root -p {{ rocketchat_mongodb_password }} --authenticationDatabase admin
        --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'rocketchat-db:27017' }] })"
      register: rs_init
      until: rs_init.rc == 0
      retries: 5
      delay: 10
      failed_when: false

    # -------------------------------------------------------------------------
    # 5. ROCKET.CHAT DEPLOYMENT
    # -------------------------------------------------------------------------
    - name: Deploy Rocket.Chat
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: rocketchat-app
        image: "docker.io/rocketchat/rocket.chat:{{ rocketchat_version | default('latest') }}"
        state: started
        restart_policy: unless-stopped
        resource_limits:
          memory: 2G
        env:
          MONGO_URL: "mongodb://root:{{ rocketchat_mongodb_password }}@rocketchat-db:27017/rocketchat?replicaSet=rs0&authSource=admin"
          MONGO_OPLOG_URL: "mongodb://root:{{ rocketchat_mongodb_password }}@rocketchat-db:27017/local?replicaSet=rs0&authSource=admin"
          ROOT_URL: "https://chat.{{ domain_name }}"
          NODE_OPTIONS: "--max-old-space-size=1536"
        network: webnet

    # -------------------------------------------------------------------------
    # 6. SECURITY & COCKPIT
    # -------------------------------------------------------------------------
    - name: Enable Cockpit and Firewalld
      service:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - cockpit.socket
        - firewalld
        - fail2ban

    - name: Firewall rules
      firewalld:
        service: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - cockpit
        - http
        - https

    - name: Configure Fail2Ban for Cockpit
      copy:
        dest: /etc/fail2ban/jail.d/cockpit.local
        content: |
          [cockpit]
          enabled = true
          port = 9090
          maxretry = 3
          bantime = 3600
      notify: Restart fail2ban

    # -------------------------------------------------------------------------
    # 7. AUTOMATIC UPDATES
    # -------------------------------------------------------------------------
    - name: Configure Security Auto-updates
      copy:
        dest: /etc/dnf/automatic.conf
        content: |
          [commands]
          upgrade_type = security
          download_updates = yes
          apply_updates = yes
          emit_via = stdio
    
    - name: Enable dnf-automatic timer
      systemd:
        name: dnf-automatic.timer
        enabled: yes
        state: started

  handlers:
    - name: Update initramfs
      command: dracut -f

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted

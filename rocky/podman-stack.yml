---
- name: Install and Harden Podman Stack with Cockpit on Rocky Linux
  hosts: all
  become: yes

  vars:
    podman_user: poduser
    subuid_range: "100000:65536"
    registries:
      - "docker.io"
      - "quay.io"

  tasks:

    # -------------------------------------------------------------------------
    # 1. INSTALL PACKAGES
    # -------------------------------------------------------------------------
    - name: Install Podman, Cockpit, and supporting tools
      dnf:
        name:
          - podman
          - buildah
          - skopeo
          - podman-docker
          - fuse-overlayfs
          - slirp4netns
          - cockpit
          - cockpit-podman
          - firewalld
        state: present

    # -------------------------------------------------------------------------
    # 2. CREATE ROOTLESS USER & LINGER
    # -------------------------------------------------------------------------
    - name: Create container user
      user:
        name: "{{ podman_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Configure subuid and subgid
      lineinfile:
        path: "/etc/{{ item }}"
        line: "{{ podman_user }}:{{ subuid_range }}"
        create: yes
      loop:
        - subuid
        - subgid

    - name: Enable lingering for user (allows containers to run without active session)
      command: "loginctl enable-linger {{ podman_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ podman_user }}"

    # -------------------------------------------------------------------------
    # 3. CONTAINER STORAGE & REGISTRY CONFIG
    # -------------------------------------------------------------------------
    - name: Configure containers storage
      copy:
        dest: /etc/containers/storage.conf
        content: |
          [storage]
          driver = "overlay"
          runroot = "/run/containers/storage"
          graphroot = "/var/lib/containers/storage"

          [storage.options]
          mount_program = "/usr/bin/fuse-overlayfs"

    - name: Configure container registries
      copy:
        dest: /etc/containers/registries.conf
        content: |
          unqualified-search-registries = [
            {% for r in registries %}
            "{{ r }}",
            {% endfor %}
          ]

          [[registry]]
          prefix = "docker.io"
          location = "docker.io"

    - name: Set container image policy (Strict)
      copy:
        dest: /etc/containers/policy.json
        content: |
          {
            "default": [
              {
                "type": "reject"
              }
            ],
            "transports": {
              "docker": {
                "docker.io": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ]
              }
            }
          }

    # -------------------------------------------------------------------------
    # 4. COCKPIT CONFIGURATION & HARDENING
    # -------------------------------------------------------------------------
    - name: Enable Cockpit socket
      systemd:
        name: cockpit.socket
        enabled: yes
        state: started

    - name: Harden Cockpit session settings
      copy:
        dest: /etc/cockpit/cockpit.conf
        content: |
          [WebService]
          IdleTimeout=15
          MaxStartups=3
          
          [Session]
          IdleTimeout=15

    # -------------------------------------------------------------------------
    # 5. SECURITY & NETWORKING
    # -------------------------------------------------------------------------
    - name: Ensure SELinux is enforcing
      selinux:
        policy: targeted
        state: enforcing

    - name: Start and enable firewalld
      service:
        name: firewalld
        enabled: yes
        state: started

    - name: Allow Cockpit through firewalld
      firewalld:
        service: cockpit
        permanent: yes
        state: enabled
        immediate: yes

    - name: Apply sysctl tuning for container networking
      copy:
        dest: /etc/sysctl.d/99-containers.conf
        content: |
          net.ipv4.ip_forward=1
          net.ipv4.conf.all.rp_filter=1
          net.ipv4.tcp_syncookies=1
      notify: Reload sysctl

    # -------------------------------------------------------------------------
    # 6. VERIFICATION
    # -------------------------------------------------------------------------
    - name: Test podman rootless info
      become_user: "{{ podman_user }}"
      command: podman info
      register: podman_test
      changed_when: false

    - name: Print podman info status
      debug:
        msg: "Podman is correctly configured for rootless user: {{ podman_user }}"
      when: podman_test.rc == 0

  handlers:
    - name: Reload sysctl
      command: sysctl --system

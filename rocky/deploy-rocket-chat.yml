---
- name: Deploy Rocket.Chat with MongoDB 4.4 (No-AVX) on Rootless Podman
  hosts: localhost
  become: yes
  gather_facts: yes

  # Zorg dat deze variabelen in vars.yml staan of hieronder worden aangevuld
  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. DIRECTORIES AANMAKEN
    # -------------------------------------------------------------------------
    - name: Create Rocket.Chat data directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - rocketchat/data
        - rocketchat/uploads
        - mongodb/data
        - mongodb/backups
        - bin

    # -------------------------------------------------------------------------
    # 2. MONGODB KEYFILE GENEREREN (Nodig voor ReplicaSet Auth)
    # -------------------------------------------------------------------------
    - name: Generate MongoDB keyfile for replica set authentication
      copy:
        dest: "/home/{{ podman_user }}/containers/mongodb/keyfile"
        content: "{{ lookup('password', '/dev/null length=756 chars=ascii_letters,digits,./') }}"
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0400'

    # -------------------------------------------------------------------------
    # 3. MONGODB 4.4 DEPLOYMENT (Geoptimaliseerd voor oude hardware)
    # -------------------------------------------------------------------------
    - name: Deploy MongoDB 4.4 container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: rocketchat-db
        image: "docker.io/library/mongo:4.4"
        state: started
        restart_policy: unless-stopped
        volumes:
          - "/home/{{ podman_user }}/containers/mongodb/data:/data/db:Z"
          - "/home/{{ podman_user }}/containers/mongodb/keyfile:/opt/keyfile:Z"
        env:
          MONGO_INITDB_ROOT_USERNAME: "root"
          MONGO_INITDB_ROOT_PASSWORD: "{{ rocketchat_mongodb_password }}"
        command: >
          mongod --replSet rs0
          --keyFile /opt/keyfile
          --bind_ip_all
          --auth
          --wiredTigerCacheSizeGB 1.5
        network: webnet
        healthcheck:
          test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
          interval: 20s
          timeout: 10s
          retries: 5

    - name: Wait for MongoDB to be ready
      pause:
        seconds: 15

    - name: Initialize MongoDB ReplicaSet
      become_user: "{{ podman_user }}"
      command: >
        podman exec rocketchat-db mongo --quiet
        --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'rocketchat-db:27017' }] })"
      register: replica_init
      failed_when: false
      changed_when: "'ok' in replica_init.stdout"

    - name: Create Rocket.Chat database user
      become_user: "{{ podman_user }}"
      command: >
        podman exec rocketchat-db mongo --quiet
        -u root -p {{ rocketchat_mongodb_password }} --authenticationDatabase admin
        --eval "db.getSiblingDB('{{ rocketchat_mongodb_database }}').createUser({
          user: '{{ rocketchat_mongodb_user }}',
          pwd: '{{ rocketchat_mongodb_password }}',
          roles: [{ role: 'readWrite', db: '{{ rocketchat_mongodb_database }}' }]
        })"
      register: user_create
      failed_when: false
      changed_when: "'Successfully added user' in user_create.stdout"

    # -------------------------------------------------------------------------
    # 4. ROCKET.CHAT DEPLOYMENT
    # -------------------------------------------------------------------------
    - name: Deploy Rocket.Chat container
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: rocketchat-app
        image: "docker.io/rocketchat/rocket.chat:{{ rocketchat_version | default('latest') }}"
        state: started
        restart_policy: unless-stopped
        resource_limits:
          memory: 2G
          cpus: 1.5
        ports:
          - "{{ rocketchat_port }}:3000"
        volumes:
          - "/home/{{ podman_user }}/containers/rocketchat/uploads:/app/uploads:Z"
        env:
          MONGO_URL: "mongodb://{{ rocketchat_mongodb_user }}:{{ rocketchat_mongodb_password }}@rocketchat-db:27017/{{ rocketchat_mongodb_database }}?replicaSet=rs0"
          MONGO_OPLOG_URL: "mongodb://{{ rocketchat_mongodb_user }}:{{ rocketchat_mongodb_password }}@rocketchat-db:27017/local?replicaSet=rs0"
          ROOT_URL: "https://chat.{{ domain_name }}"
          PORT: "{{ rocketchat_port }}"
          DEPLOY_METHOD: "podman-ansible"
          NODE_OPTIONS: "--max-old-space-size=1536"
        network: webnet

    # -------------------------------------------------------------------------
    # 5. CADDYFILE CONFIGURATIE
    # -------------------------------------------------------------------------
    - name: Add Rocket.Chat to Caddyfile
      blockinfile:
        path: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        marker: "# {mark} ROCKET.CHAT"
        block: |
          chat.{{ domain_name }} {
              reverse_proxy rocketchat-app:{{ rocketchat_port }}
              header {
                  Strict-Transport-Security "max-age=31536000;"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "SAMEORIGIN"
              }
              encode gzip zstd
          }
      notify: Reload Caddy

    # -------------------------------------------------------------------------
    # 6. ONDERHOUD SCRIPTS
    # -------------------------------------------------------------------------
    - name: Create Backup Script
      copy:
        dest: "/home/{{ podman_user }}/bin/backup-rocketchat.sh"
        mode: '0755'
        owner: "{{ podman_user }}"
        content: |
          #!/bin/bash
          TIMESTAMP=$(date +%Y%m%d)
          podman exec rocketchat-db mongodump --archive --gzip \
            --username {{ rocketchat_mongodb_user }} \
            --password {{ rocketchat_mongodb_password }} \
            --db {{ rocketchat_mongodb_database }} \
            > /home/{{ podman_user }}/containers/mongodb/backups/db_${TIMESTAMP}.gz

    - name: Schedule Backup Cron
      cron:
        name: "Daily RocketChat Backup"
        user: "{{ podman_user }}"
        hour: "3"
        minute: "0"
        job: "/home/{{ podman_user }}/bin/backup-rocketchat.sh"

  handlers:
    - name: Reload Caddy
      become_user: "{{ podman_user }}"
      command: podman exec caddy caddy reload --config /etc/caddy/Caddyfile
      ignore_errors: yes

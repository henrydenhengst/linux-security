---
- name: Deploy Full LCH Stack on Void Linux (Mattermost)
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    podman_user: "lch_admin"
    container_user_uid: 1001
    domain_name: "jouwdomein.nl"
    # Versies
    mm_version: "latest"
    postgres_version: "16-alpine"
    caddy_version: "alpine"
    nginx_version: "alpine"

  tasks:
    # -------------------------------------------------------------------------
    # 1. VOID SYSTEM PREPARATION
    # -------------------------------------------------------------------------
    - name: Install Void System Packages
      xbps:
        name:
          - podman
          - curl
          - git
          - python3
          - dbus
          - opendoas # of sudo
          - ip6tables
        state: present
        update: yes

    - name: Ensure podman user exists
      user:
        name: "{{ podman_user }}"
        shell: /bin/sh
        state: present
        create_home: yes
        uid: "{{ container_user_uid }}"
        groups: wheel

    - name: Configure Rootless Mapping
      copy:
        dest: "{{ item }}"
        content: "{{ podman_user }}:100000:65536\n"
      loop:
        - /etc/subuid
        - /etc/subgid

    # -------------------------------------------------------------------------
    # 2. DIRECTORY STRUCTURE
    # -------------------------------------------------------------------------
    - name: Create App Directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - caddy/data
        - caddy/config
        - nginx/html
        - mattermost/data
        - mattermost/logs
        - postgres/data

    # -------------------------------------------------------------------------
    # 3. CONFIGURATION FILES
    # -------------------------------------------------------------------------
    - name: Create Caddyfile
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        content: |
          {{ domain_name }} {
              reverse_proxy nginx:80
          }
          chat.{{ domain_name }} {
              reverse_proxy mattermost-app:8065
          }
        owner: "{{ podman_user }}"

    # -------------------------------------------------------------------------
    # 4. NETWORK & CONTAINERS (Postgres + Mattermost)
    # -------------------------------------------------------------------------
    - name: Create Podman Network
      become_user: "{{ podman_user }}"
      command: podman network exists lchnet || podman network create lchnet

    - name: Deploy PostgreSQL (Mattermost DB)
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: mattermost-db
        image: "docker.io/library/postgres:{{ postgres_version }}"
        state: started
        restart_policy: always
        network: lchnet
        env:
          POSTGRES_USER: "mmuser"
          POSTGRES_PASSWORD: "mm_password_vervang_mij"
          POSTGRES_DB: "mattermost"
        volumes:
          - "/home/{{ podman_user }}/containers/postgres/data:/var/lib/postgresql/data:Z"

    - name: Deploy Mattermost App
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: mattermost-app
        image: "docker.io/mattermost/mattermost-team-edition:{{ mm_version }}"
        state: started
        restart_policy: always
        network: lchnet
        env:
          MM_SQLSETTINGS_DRIVERNAME: "postgres"
          MM_SQLSETTINGS_DATASOURCE: "postgres://mmuser:mm_password_vervang_mij@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10"
          MM_SERVICESETTINGS_SITEURL: "https://chat.{{ domain_name }}"
        volumes:
          - "/home/{{ podman_user }}/containers/mattermost/data:/mattermost/data:Z"
          - "/home/{{ podman_user }}/containers/mattermost/logs:/mattermost/logs:Z"

    - name: Deploy Web Proxy (Caddy & Nginx)
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: started
        restart_policy: always
        network: lchnet
        ports: "{{ item.ports | default(omit) }}"
        volumes: "{{ item.volumes | default(omit) }}"
      loop:
        - { name: 'nginx', image: "docker.io/nginx:{{ nginx_version }}", volumes: ["/home/{{ podman_user }}/containers/nginx/html:/usr/share/nginx/html:Z"] }
        - { name: 'caddy', image: "docker.io/caddy:{{ caddy_version }}", ports: ["80:80", "443:443"], volumes: ["/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:Z", "/home/{{ podman_user }}/containers/caddy/data:/data:Z"] }

    # -------------------------------------------------------------------------
    # 5. VOID PERSISTENCE (Runit Service)
    # -------------------------------------------------------------------------
    - name: Create Runit service for Podman Stack
      file:
        path: /etc/sv/podman-lch
        state: directory

    - name: Create Runit Run Script
      copy:
        dest: /etc/sv/podman-lch/run
        mode: '0755'
        content: |
          #!/bin/sh
          # Start containers for user
          su - {{ podman_user }} -c 'podman start --all'
          exec pause

    - name: Enable Runit Service
      file:
        src: /etc/sv/podman-lch
        dest: /var/service/podman-lch
        state: link

    - name: Enable D-Bus (Required for Podman)
      file:
        src: "/etc/sv/dbus"
        dest: "/var/service/dbus"
        state: link

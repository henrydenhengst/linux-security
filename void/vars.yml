---
# ============================================
# DUCKDNS & DOMAIN CONFIGURATION
# ============================================
duckdns_subdomain: "linuxcafehaarlem"
duckdns_token: "YOUR_TOKEN_HERE" # Vervang door je echte token
duckdns_update_ip: "ipv4"

custom_domain: "linuxcafehaarlem.nl"
# De site.yml gebruikt 'domain_name' voor Caddy en Mattermost
domain_name: "{{ custom_domain }}"
admin_email: "vcp5693@duck.com"
timezone: "Europe/Amsterdam"

# ============================================
# USER CONFIGURATION
# ============================================
podman_user: "poduser"
container_user_uid: 1001
container_user_gid: 1001

# ============================================
# CONTAINER VERSIONS (Lichtgewicht voor oude hardware)
# ============================================
caddy_version: "2.7-alpine"
postgres_version: "16-alpine"
mattermost_version: "9.5"

# ============================================
# MATTERMOST & DATABASE CONFIGURATION
# ============================================
db_user: "mmuser"
db_name: "mattermost"
db_password: "KiesHierEenSterkWachtwoord123!" # Zorg dat dit uniek is

# ============================================
# SECURITY & WEBHOOKS
# ============================================
# Verwijder het hekje hieronder om Discord/Slack meldingen te activeren
# alert_webhook: "https://discord.com/api/webhooks/..."

# Poorten die open moeten in de firewall
open_ports:
  - 80
  - 443
  - 22

---
- name: Deploy Full LCH Stack on Void Linux (Mattermost)
  hosts: all
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. VOID SYSTEM & REPO PREPARATION
    # -------------------------------------------------------------------------
    - name: Install Core System Packages
      xbps:
        name:
          - podman
          - curl
          - git
          - python3
          - dbus
          - sudo
          - ip6tables
          - iptables
          - dcron
          - syslog-ng
          - fail2ban
          - zram-enabler
        state: present
        update: yes

    - name: Ensure podman user exists
      user:
        name: "{{ podman_user }}"
        shell: /bin/sh
        state: present
        create_home: yes
        uid: "{{ container_user_uid }}"
        groups: wheel

    - name: Configure Rootless Mapping
      copy:
        dest: "{{ item }}"
        content: "{{ podman_user }}:100000:65536\n"
      loop:
        - /etc/subuid
        - /etc/subgid

    # -------------------------------------------------------------------------
    # 2. DIRECTORY STRUCTURE
    # -------------------------------------------------------------------------
    - name: Create App Directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - caddy/data
        - caddy/config
        - nginx/html
        - mattermost/data
        - mattermost/logs
        - postgres/data

    # -------------------------------------------------------------------------
    # 3. SECURITY: FIREWALL & SSH HARDENING
    # -------------------------------------------------------------------------
    - name: Configure Firewall Rules (IPv4)
      shell: |
        iptables -F
        iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
        iptables -A INPUT -i lo -j ACCEPT
        iptables -A INPUT -p tcp --dport 22 -j ACCEPT
        iptables -A INPUT -p tcp --dport 80 -j ACCEPT
        iptables -A INPUT -p tcp --dport 443 -j ACCEPT
        iptables -P INPUT DROP
        iptables -P FORWARD DROP
        iptables-save > /etc/iptables.rules

    - name: Ensure Firewall persists after reboot
      copy:
        dest: /etc/rc.local
        content: |
          #!/bin/sh
          iptables-restore < /etc/iptables.rules
          exit 0
        mode: '0755'

    - name: SSH Hardening - Disable Passwords
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
      notify: Restart SSH

    - name: Configure Fail2ban Jail
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          filter = sshd
          port = 22
          logpath = /var/log/messages
          maxretry = 3
          bantime = 1d

    # -------------------------------------------------------------------------
    # 4. CONFIGURATION FILES
    # -------------------------------------------------------------------------
    - name: Create Caddyfile
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        content: |
          {{ domain_name }} {
              reverse_proxy nginx:80
          }
          chat.{{ domain_name }} {
              reverse_proxy mattermost-app:8065
          }
        owner: "{{ podman_user }}"

    # -------------------------------------------------------------------------
    # 5. NETWORK & CONTAINERS
    # -------------------------------------------------------------------------
    - name: Create Podman Network
      become_user: "{{ podman_user }}"
      command: podman network exists lchnet || podman network create lchnet

    - name: Deploy PostgreSQL (Mattermost DB)
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: mattermost-db
        image: "docker.io/library/postgres:{{ postgres_version }}"
        state: started
        restart_policy: always
        network: lchnet
        env:
          POSTGRES_USER: "{{ db_user }}"
          POSTGRES_PASSWORD: "{{ db_password }}"
          POSTGRES_DB: "{{ db_name }}"
        volumes:
          - "/home/{{ podman_user }}/containers/postgres/data:/var/lib/postgresql/data:Z"

    - name: Deploy Mattermost App
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: mattermost-app
        image: "docker.io/mattermost/mattermost-team-edition:{{ mattermost_version }}"
        state: started
        restart_policy: always
        network: lchnet
        env:
          MM_SQLSETTINGS_DRIVERNAME: "postgres"
          MM_SQLSETTINGS_DATASOURCE: "postgres://{{ db_user }}:{{ db_password }}@mattermost-db:5432/{{ db_name }}?sslmode=disable&connect_timeout=10"
          MM_SERVICESETTINGS_SITEURL: "https://chat.{{ domain_name }}"
        volumes:
          - "/home/{{ podman_user }}/containers/mattermost/data:/mattermost/data:Z"
          - "/home/{{ podman_user }}/containers/mattermost/logs:/mattermost/logs:Z"
        labels:
          io.containers.autoupdate: "image"

    - name: Deploy Web Proxy (Caddy & Nginx)
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: started
        restart_policy: always
        network: lchnet
        ports: "{{ item.ports | default(omit) }}"
        volumes: "{{ item.volumes | default(omit) }}"
      loop:
        - { name: 'nginx', image: "docker.io/nginx:{{ nginx_version }}", volumes: ["/home/{{ podman_user }}/containers/nginx/html:/usr/share/nginx/html:Z"] }
        - { name: 'caddy', image: "docker.io/caddy:{{ caddy_version }}", ports: ["80:80", "443:443"], volumes: ["/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:Z", "/home/{{ podman_user }}/containers/caddy/data:/data:Z"] }

    # -------------------------------------------------------------------------
    # 6. PERSISTENCE & AUTO-UPDATES
    # -------------------------------------------------------------------------
    - name: Create Runit service voor auto-start containers
      file:
        path: /etc/sv/podman-lch
        state: directory

    - name: Create Runit Run Script
      copy:
        dest: /etc/sv/podman-lch/run
        mode: '0755'
        content: |
          #!/bin/sh
          su - {{ podman_user }} -c 'podman start --all'
          exec pause

    - name: Enable Runit Services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - podman-lch
        - dbus
        - dcron
        - syslog-ng
        - fail2ban
        - zram-enabler

    - name: Setup Cronjobs (System Update & Container Update)
      cron:
        name: "{{ item.name }}"
        user: "{{ item.user }}"
        minute: "0"
        hour: "{{ item.hour }}"
        job: "{{ item.job }}"
      loop:
        - { name: "System Security Updates", user: "root", hour: "3", job: "xbps-install -Syu -y && podman image prune -f" }
        - { name: "Container Auto-update", user: "{{ podman_user }}", hour: "4", job: "podman auto-update" }

  handlers:
    - name: Restart SSH
      shell: "sv restart sshd"

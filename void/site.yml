---
- name: Deploy LCH Stack on Void Linux
  hosts: localhost
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. SYSTEM BASE & PERMISSIONS
    # -------------------------------------------------------------------------
    - name: Install System Packages
      xbps:
        name: [podman, curl, git, python3, dbus, iptables, dcron, syslog-ng, fail2ban, zram-enabler, logrotate, elogind]
        state: present
        update: yes

    - name: Ensure DBus and Elogind are active
      file: { src: "/etc/sv/{{ item }}", dest: "/var/service/{{ item }}", state: link }
      loop: [dbus, elogind]

    - name: Enable Linger for Podman User
      command: "loginctl enable-linger {{ podman_user }}"
      changed_when: false

    - name: Create Podman User
      user: 
        name: "{{ podman_user }}"
        uid: "{{ container_user_uid }}"
        group: "{{ container_user_gid }}"
        groups: wheel
        create_home: yes

    - name: Configure SubUID/GID
      lineinfile: { path: "/etc/{{ item }}", line: "{{ podman_user }}:100000:65536", create: yes }
      loop: [subuid, subgid]

    # -------------------------------------------------------------------------
    # 2. NETWORK & SECURITY
    # -------------------------------------------------------------------------
    - name: Write Iptables Rules
      copy:
        dest: /etc/iptables.rules
        content: |
          *filter
          :INPUT DROP [0:0]
          :FORWARD DROP [0:0]
          :OUTPUT ACCEPT [0:0]
          -A INPUT -m conntrack --ctstate INVALID -j DROP
          -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
          -A INPUT -i lo -j ACCEPT
          -A INPUT -p icmp -j ACCEPT
          -A INPUT -p tcp --dport 22 -j ACCEPT
          -A INPUT -p tcp --dport 80 -j ACCEPT
          -A INPUT -p tcp --dport 443 -j ACCEPT
          COMMIT

    - name: Create iptables-restore Service
      file: { path: /etc/sv/iptables-restore, state: directory }

    - name: Create iptables-restore Run Script
      copy:
        dest: /etc/sv/iptables-restore/run
        mode: '0755'
        content: "#!/bin/sh\niptables-restore < /etc/iptables.rules\nexec pause"

    - name: Configure Fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = 22
          filter = sshd
          logpath = /var/log/messages
          maxretry = 3
          bantime = 1h

    # -------------------------------------------------------------------------
    # 3. STORAGE & CADDY
    # -------------------------------------------------------------------------
    - name: Create App Directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop: [caddy/data, caddy/config, hugo_site, mattermost/data, postgres/data, backups]

    - name: Create Caddyfile
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        owner: "{{ podman_user }}"
        content: |
          {
              email {{ admin_email }}
          }
          {{ domain_name }} {
              root * /var/www/hugo
              file_server
              encode zstd gzip
              tls { protocols tls1.2 tls1.3 }
              header {
                  Strict-Transport-Security "max-age=31536000;"
                  X-Content-Type-Options nosniff
                  X-Frame-Options DENY
                  Referrer-Policy strict-origin-when-cross-origin
              }
          }
          chat.{{ domain_name }} {
              reverse_proxy localhost:8065
          }

    # -------------------------------------------------------------------------
    # 4. PODMAN STACK
    # -------------------------------------------------------------------------
    - name: Create LCH Pod
      containers.podman.podman_pod:
        name: lch-pod
        state: present
        recreate: yes
        stop_timeout: 30
        ports: ["80:80", "443:443"]
      become_user: "{{ podman_user }}"

    - name: Deploy Infrastructure Containers
      containers.podman.podman_container:
        name: "{{ item.name }}"
        pod: lch-pod
        image: "{{ item.image }}"
        state: started
        restart_policy: always
        memory: "{{ item.memory }}"
        log_driver: k8s-file
        log_opt: "max-size=10mb,max-file=3"
        env: "{{ item.env | default(omit) }}"
        volumes: "{{ item.volumes }}"
        healthcheck: "{{ item.healthcheck | default(omit) }}"
        labels: "{{ item.labels | default(omit) }}"
      become_user: "{{ podman_user }}"
      loop:
        - name: mattermost-db
          image: "docker.io/library/postgres:{{ postgres_version }}"
          memory: "512m"
          env: { POSTGRES_USER: "{{ db_user }}", POSTGRES_PASSWORD: "{{ db_password }}", POSTGRES_DB: "{{ db_name }}", POSTGRES_INITDB_ARGS: "--data-checksums" }
          volumes: ["/home/{{ podman_user }}/containers/postgres/data:/var/lib/postgresql/data:Z"]
          healthcheck: { test: ["CMD-SHELL", "pg_isready -U {{ db_user }}"], interval: 20s }
        
        - name: mattermost-app
          image: "docker.io/mattermost/mattermost-team-edition:{{ mattermost_version }}"
          memory: "1g"
          env: { MM_SQLSETTINGS_DRIVERNAME: "postgres", MM_SQLSETTINGS_DATASOURCE: "postgres://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}?sslmode=disable&connect_timeout=10", MM_SERVICESETTINGS_SITEURL: "https://chat.{{ domain_name }}" }
          volumes: ["/home/{{ podman_user }}/containers/mattermost/data:/mattermost/data:Z"]
          healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"], interval: 30s }
          labels: { "io.containers.autoupdate": "image" }

        - name: caddy
          image: "docker.io/caddy:{{ caddy_version }}"
          memory: "256m"
          volumes: ["/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:z", "/home/{{ podman_user }}/containers/caddy/data:/data:z", "/home/{{ podman_user }}/containers/caddy/config:/config:z", "/home/{{ podman_user }}/containers/hugo_site:/var/www/hugo:z"]

    # -------------------------------------------------------------------------
    # 5. AUTONOMOUS SURVIVAL (Watchdog, Backup, DNS)
    # -------------------------------------------------------------------------
    - name: Enable Maintenance Services
      file: { src: "/etc/sv/{{ item }}", dest: "/var/service/{{ item }}", state: link }
      loop: [dcron, syslog-ng, fail2ban, zram-enabler, iptables-restore]

    - name: Setup Final Cronjobs
      cron:
        name: "{{ item.name }}"
        user: "{{ item.user }}"
        minute: "{{ item.minute | default('0') }}"
        hour: "{{ item.hour | default('*') }}"
        job: "{{ item.job }}"
      loop:
        - name: "LCH Watchdog"
          user: "{{ podman_user }}"
          minute: "*/5"
          job: >
            podman ps --format '{% raw %}{{.Names}} {{.Status}}{% endraw %}' | grep -w unhealthy | awk '{print $1}' | while read c; do
            C_FILE=/var/tmp/watchdog_$c.count; COUNT=$(cat $C_FILE 2>/dev/null || echo 0);
            if [ $COUNT -lt 3 ]; then
            if [ "$c" = "mattermost-db" ]; then podman restart mattermost-db && sleep 10 && podman restart mattermost-app; else podman restart $c; fi;
            echo $((COUNT+1)) > $C_FILE; logger "WATCHDOG: Restarted $c (Attempt $((COUNT+1)))";
            else logger "CRITICAL: Watchdog failed on $c";
            [ -n "{{ alert_webhook | default('') }}" ] && curl -X POST -H "Content-Type: application/json" -d "{\"text\":\"🚨 Watchdog gave up on $c\"}" {{ alert_webhook | default('http://localhost') }};
            fi; done; find /var/tmp/watchdog_*.count -mmin +60 -delete 2>/dev/null

        - name: "DB Backup & Audit"
          user: "{{ podman_user }}"
          minute: "30"
          hour: "2"
          job: >
            if [ $(df --output=pcent / | tail -1 | tr -dc '0-9') -lt 90 ]; then
            B_FILE=/home/{{ podman_user }}/backups/mm_$(date +\%F).sql.gz;
            podman exec mattermost-db pg_dump -U {{ db_user }} {{ db_name }} | gzip > $B_FILE && gzip -t $B_FILE &&
            podman exec mattermost-db bash -c "createdb -U {{ db_user }} test_audit && gunzip -c /home/{{ podman_user }}/backups/mm_$(date +\%F).sql.gz | psql -U {{ db_user }} test_audit && dropdb -U {{ db_user }} test_audit" &&
            find /home/{{ podman_user }}/backups/ -name '*.gz' -mtime +7 -delete ||
            (logger "CRITICAL: Backup Audit failed"; [ -n "{{ alert_webhook | default('') }}" ] && curl -X POST -d "{\"text\":\"❌ Backup Audit failure\"}" {{ alert_webhook | default('http://localhost') }})
            fi

        - { name: "DuckDNS Update", user: "{{ podman_user }}", minute: "*/15", job: "curl -s \"https://www.duckdns.org/update?domains={{ duckdns_subdomain }}&token={{ duckdns_token }}&ip=\" > /dev/null" }
        - { name: "System Maintenance", user: "root", minute: "10", hour: "3", job: "(/usr/bin/xbps-install -Syu -y && podman image prune -af) || logger 'Update failed'" }
        - { name: "Container Auto-update", user: "{{ podman_user }}", minute: "20", hour: "4", job: "podman auto-update" }

  handlers:
    - name: Restart SSH
      shell: "sv restart sshd"

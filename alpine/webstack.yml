---
- name: Deploy DuckDNS, Caddy, Nginx, and PHP-FPM on Alpine Linux
  hosts: all
  become: yes
  gather_facts: yes

  vars_files:
    - vars.yml

  tasks:
    # -------------------------------------------------------------------------
    # 1. ALPINE PREREQUISITES & PACKAGE INSTALLATION
    # -------------------------------------------------------------------------
    - name: Install necessary Alpine packages
      community.general.apk:
        name:
          - podman
          - podman-docker
          - slirp4netns
          - fuse-overlayfs
          - shadow-uidmap
          - awall
          - ip6tables
          - util-linux # Voor 'setpriv' en user management
        state: present
        update_cache: yes

    - name: Ensure podman user exists
      user:
        name: "{{ podman_user }}"
        shell: /bin/sh
        state: present
        create_home: yes
        uid: "{{ container_user_uid }}"

    - name: Configure subuid/subgid for rootless mapping
      copy:
        dest: "{{ item }}"
        content: "{{ podman_user }}:100000:65536\n"
      loop:
        - /etc/subuid
        - /etc/subgid

    - name: Create container directories
      file:
        path: "/home/{{ podman_user }}/containers/{{ item }}"
        state: directory
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
        mode: '0755'
      loop:
        - caddy/data
        - caddy/config
        - nginx/html
        - nginx/conf.d
        - duckdns/config

    # -------------------------------------------------------------------------
    # 2. CONFIGURATION FILES (Caddy, Nginx, PHP)
    # -------------------------------------------------------------------------
    - name: Create Caddyfile configuration
      copy:
        dest: "/home/{{ podman_user }}/containers/caddy/Caddyfile"
        content: |
          {{ domain_name }} {
              reverse_proxy nginx:80
              header {
                  Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
              }
              encode gzip zstd
          }
        owner: "{{ podman_user }}"
        mode: '0644'

    - name: Create Nginx configuration
      copy:
        dest: "/home/{{ podman_user }}/containers/nginx/conf.d/default.conf"
        content: |
          server {
              listen 80;
              root /usr/share/nginx/html;
              index index.html index.php;
              location / { try_files $uri $uri/ =404; }
              location ~ \.php$ {
                  fastcgi_pass php-fpm:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
              }
          }
        owner: "{{ podman_user }}"

    - name: Create sendmail.php script
      template: # Gebruik template als je variabelen uit vars.yml wilt injecteren
        src: sendmail.php.j2 # Of gebruik 'copy' met 'content' zoals in je origineel
        dest: "/home/{{ podman_user }}/containers/nginx/html/sendmail.php"
        owner: "{{ podman_user }}"

    # -------------------------------------------------------------------------
    # 3. NETWORK & PRIVILEGED PORTS
    # -------------------------------------------------------------------------
    - name: Allow rootless privileged ports via sysctl
      sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        state: present
        sysctl_file: /etc/sysctl.d/podman.conf

    - name: Create pod network
      become_user: "{{ podman_user }}"
      command: podman network exists webnet || podman network create webnet

    # -------------------------------------------------------------------------
    # 4. CONTAINER DEPLOYMENT
    # -------------------------------------------------------------------------
    - name: Deploy Containers (DuckDNS, PHP-FPM, Nginx, Caddy)
      become_user: "{{ podman_user }}"
      containers.podman.podman_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: started
        restart_policy: unless-stopped
        network: webnet
        volumes: "{{ item.volumes | default(omit) }}"
        env: "{{ item.env | default(omit) }}"
        ports: "{{ item.ports | default(omit) }}"
        command: "{{ item.command | default(omit) }}"
      loop:
        - name: duckdns
          image: "lscr.io/linuxserver/duckdns:latest"
          env: { SUBDOMAINS: "{{ duckdns_subdomain }}", TOKEN: "{{ duckdns_token }}" }
        - name: php-fpm
          image: "docker.io/php:8.3-fpm-alpine"
          volumes: ["/home/{{ podman_user }}/containers/nginx/html:/var/www/html:Z"]
          command: >
            sh -c "apk add --no-cache msmtp && 
                   echo 'account default\nhost localhost\nport 25\nfrom {{ duck_email }}\nprotocol smtp\ntls off' > /etc/msmtprc &&
                   chmod 600 /etc/msmtprc && php-fpm"
        - name: nginx
          image: "docker.io/nginx:alpine"
          volumes: 
            - "/home/{{ podman_user }}/containers/nginx/html:/usr/share/nginx/html:Z"
            - "/home/{{ podman_user }}/containers/nginx/conf.d:/etc/nginx/conf.d:Z"
        - name: caddy
          image: "docker.io/caddy:alpine"
          ports: ["80:80", "443:443"]
          volumes:
            - "/home/{{ podman_user }}/containers/caddy/Caddyfile:/etc/caddy/Caddyfile:Z"
            - "/home/{{ podman_user }}/containers/caddy/data:/data:Z"

    # -------------------------------------------------------------------------
    # 5. SECURITY (AWALL FIREWALL)
    # -------------------------------------------------------------------------
    - name: Configure Awall (Alpine Firewall)
      copy:
        dest: /etc/awall/optional/web.json
        content: |
          {
            "description": "Web traffic",
            "filter": [
              { "in": "internet", "out": "_fw", "service": ["ssh", "http", "https"], "action": "accept" }
            ]
          }

    - name: Enable and Activate Firewall
      shell: |
        awall enable web
        awall activate
      args:
        creates: /etc/iptables/rules.v4

    # -------------------------------------------------------------------------
    # 6. PERSISTENCE (OpenRC workaround for Linger)
    # -------------------------------------------------------------------------
    # Alpine heeft geen 'loginctl enable-linger'. 
    # Om containers te laten draaien na uitloggen, gebruiken we een OpenRC local script.
    - name: Ensure containers start on boot (OpenRC)
      copy:
        dest: /etc/local.d/podman.start
        content: |
          #!/bin/sh
          su - {{ podman_user }} -c "podman start --all"
        mode: '0755'

    - name: Enable local service
      service:
        name: local
        enabled: yes
        state: started
